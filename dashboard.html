
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>組織診断 管理者ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f2f5;color:#2d3748;min-height:100vh}
.header{background:linear-gradient(135deg,#1a365d 0%,#2d6a4f 100%);color:#fff;padding:18px 32px}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;opacity:.8;margin-top:2px}
.container{max-width:1100px;margin:0 auto;padding:0 24px 40px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:24px;margin-top:20px}
.card-title{font-size:15px;font-weight:700;color:#1a365d;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.step-badge{background:#1a365d;color:#fff;border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-primary{background:#1a365d;color:#fff}.btn-primary:hover:not(:disabled){background:#2c5282}
.btn-green{background:#2d6a4f;color:#fff}.btn-green:hover:not(:disabled){background:#1e4d36}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.drop-zone{border:2px dashed #cbd5e0;border-radius:10px;padding:28px 20px;text-align:center;color:#718096;cursor:pointer;transition:all .2s;font-size:14px}
.drop-zone:hover,.drop-zone.dragover{border-color:#1a365d;background:#ebf4ff}
.status{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px}
.st-ok{background:#d1fae5;color:#065f46}.st-err{background:#fee2e2;color:#991b1b}.st-info{background:#dbeafe;color:#1e40af}
.hidden{display:none!important}
.co-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.co-btn{padding:6px 16px;border-radius:20px;border:2px solid #1a365d;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.co-btn.active{background:#1a365d;color:#fff}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.kpi-card{background:#f8fafc;border-radius:10px;padding:20px;text-align:center;border:1px solid #e2e8f0}
.kpi-label{font-size:12px;color:#718096;margin-bottom:6px}
.kpi-value{font-size:34px;font-weight:800;color:#1a365d;line-height:1.1}
.kpi-unit{font-size:12px;color:#718096;margin-top:4px}
.enps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.enps-item{background:#f8fafc;border-radius:8px;padding:14px;text-align:center}
.enps-lbl{font-size:11px;color:#718096;margin-bottom:6px}
.enps-val{font-size:28px;font-weight:700;line-height:1.1}
.bar-wrap{position:relative;height:300px}
.radar-wrap{position:relative;height:340px;max-width:500px;margin:0 auto}
.cat-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
.cat-tbl th{background:#1a365d;color:#fff;padding:10px 12px;text-align:left;font-weight:600}
.cat-tbl td{padding:9px 12px;border-bottom:1px solid #e2e8f0;vertical-align:middle}
.cat-tbl tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.b-good{background:#d1fae5;color:#065f46}
.b-warn{background:#fef3c7;color:#92400e}
.b-bad{background:#fee2e2;color:#991b1b}
.need-list{list-style:none}
.need-item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #f0f0f0}
.need-item:last-child{border-bottom:none}
.need-rank{background:#1a365d;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.need-title{font-size:14px;font-weight:600;margin-bottom:4px;color:#1a365d}
.need-desc{font-size:13px;color:#718096;line-height:1.6}
.debug-panel{background:#1e293b;color:#94a3b8;border-radius:8px;padding:14px;font-family:monospace;font-size:11px;margin-top:12px;max-height:160px;overflow-y:auto;white-space:pre-wrap}
@media(max-width:768px){.kpi-grid{grid-template-columns:1fr 1fr}.enps-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="sub">組織診断システム</div>
  <h1>📊 管理者ダッシュボード</h1>
</div>

<div class="container">

<div class="card">
  <div class="card-title"><span class="step-badge">1</span>データ取得</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
    <div style="flex:1;min-width:180px">
      <button class="btn btn-primary" id="fetchBtn" onclick="fetchCloud()">☁️ クラウドから回答を取得</button>
      <div id="cloudStatus" class="status hidden"></div>
    </div>
    <div id="dropZone" class="drop-zone" style="flex:1;min-width:200px"
      ondrop="handleDrop(event)"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      onclick="document.getElementById('fileInput').click()">
      📂 JSONファイルをドロップ、またはクリックして選択
      <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(event)">
    </div>
  </div>
  <div id="debugWrap" class="hidden" style="margin-top:12px">
    <div style="font-size:12px;color:#718096;margin-bottom:4px">🔍 データ構造確認（先頭1件）</div>
    <div id="debugPanel" class="debug-panel"></div>
  </div>
</div>

<div id="filterCard" class="card hidden">
  <div class="card-title"><span class="step-badge">2</span>会社別フィルター</div>
  <div id="coBtns" class="co-btns"></div>
</div>

<div id="analytics" class="hidden">

  <div class="card">
    <div class="card-title">📈 全体サマリー</div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">回答数</div><div class="kpi-value" id="kpiCount">—</div><div class="kpi-unit">件</div></div>
      <div class="kpi-card"><div class="kpi-label">全体ポジティブ率</div><div class="kpi-value" id="kpiPos">—</div><div class="kpi-unit">%</div></div>
      <div class="kpi-card"><div class="kpi-label">eNPSスコア</div><div class="kpi-value" id="kpiEnps">—</div><div class="kpi-unit">pt</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💚 eNPS（従業員推薦度）</div>
    <div class="enps-grid">
      <div class="enps-item"><div class="enps-lbl">推薦者（9〜10）</div><div class="enps-val" id="enpsPromo" style="color:#16a34a">—</div><div style="font-size:12px;color:#718096">%</div></div>
      <div class="enps-item"><div class="enps-lbl">中立者（7〜8）</div><div class="enps-val"  id="enpsNeut"  style="color:#ca8a04">—</div><div style="font-size:12px;color:#718096">%</div></div>
      <div class="enps-item"><div class="enps-lbl">批判者（0〜6）</div><div class="enps-val"  id="enpsDetr"  style="color:#dc2626">—</div><div style="font-size:12px;color:#718096">%</div></div>
      <div class="enps-item"><div class="enps-lbl">eNPSスコア</div><div class="enps-val"        id="enpsScore" style="color:#1a365d">—</div><div style="font-size:12px;color:#718096">pt</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 カテゴリ別スコア</div>
    <div class="bar-wrap"><canvas id="barChart"></canvas></div>
    <table class="cat-tbl">
      <thead><tr><th>カテゴリ</th><th style="text-align:center">ポジティブ率</th><th style="text-align:center">ネガティブ率</th><th style="text-align:center">判定</th></tr></thead>
      <tbody id="catTblBody"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">🕸️ カテゴリ別レーダーチャート</div>
    <div class="radar-wrap"><canvas id="radarChart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title">📚 研修ニーズ分析</div>
    <ul class="need-list" id="trainingList"></ul>
  </div>

  <div class="card">
    <div class="card-title">💼 人事施策提言</div>
    <ul class="need-list" id="policyList"></ul>
  </div>

  <div class="card">
    <div class="card-title">📤 レポート出力</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="exportPDF()">📄 PDFレポート出力</button>
      <button class="btn btn-green"   onclick="exportExcel()">📊 Excelレポート出力</button>
    </div>
  </div>

</div>
</div>

<script>

let allData=[], filtered=[], barChartObj=null, radarChartObj=null, currentCompany='全社';

/* ★ GAS は answers を JSON文字列で返すため必ずパース */
function parseAnswers(row) {
  if (!row) return {};
  let ans = row.answers;
  if (typeof ans === 'string') { try { ans = JSON.parse(ans); } catch(e) { ans = {}; } }
  return ans || {};
}

async function fetchCloud() {
  const btn=document.getElementById('fetchBtn'), st=document.getElementById('cloudStatus');
  btn.disabled=true; btn.textContent='取得中…';
  st.className='status st-info'; st.textContent='クラウドからデータを取得しています…'; st.classList.remove('hidden');
  try {
    const res=await fetch(GAS_URL), text=await res.text(), raw=JSON.parse(text);
    const data = Array.isArray(raw) ? raw : (raw && Array.isArray(raw.responses) ? raw.responses : null);
    if (!data) throw new Error('不正なデータ形式');
    loadData(data);
    st.className='status st-ok'; st.textContent=`✅ ${data.length}件のデータを取得しました`;
  } catch(e) {
    st.className='status st-err'; st.textContent='❌ 取得エラー: '+e.message;
  } finally { btn.disabled=false; btn.textContent='☁️ クラウドから回答を取得'; }
}

function handleFile(e){const f=e.target.files[0];if(f)readJSON(f);}
function handleDrop(e){e.preventDefault();document.getElementById('dropZone').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)readJSON(f);}
function readJSON(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);loadData(Array.isArray(d)?d:[d]);}catch{alert('JSONの解析に失敗しました');}};r.readAsText(file);}

function loadData(data){
  allData=data; filtered=[...data]; currentCompany='全社';
  showDebug(data[0]); buildFilter(); renderAll();
}

function showDebug(row){
  if(!row)return;
  const ans=parseAnswers(row), keys=Object.keys(ans), smpl={};
  keys.slice(0,6).forEach(k=>smpl[k]=ans[k]);
  document.getElementById('debugPanel').textContent=
    `回答キー数: ${keys.length}\nキー（先頭6件）: ${keys.slice(0,6).join(', ')}${keys.length>6?' …':''}\nサンプル値: ${JSON.stringify(smpl)}`;
  document.getElementById('debugWrap').classList.remove('hidden');
}

function buildFilter(){
  const companies=[...new Set(allData.map(r=>r.company||'未設定'))];
  const wrap=document.getElementById('coBtns'); wrap.innerHTML='';
  const mk=(label,fn)=>{const b=document.createElement('button');b.className='co-btn';b.textContent=label;b.onclick=()=>{document.querySelectorAll('.co-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');fn();};return b;};
  const ab=mk(`全社 (${allData.length}件)`,()=>{filtered=[...allData];currentCompany='全社';renderAll();});
  ab.classList.add('active'); wrap.appendChild(ab);
  companies.forEach(co=>{const cnt=allData.filter(r=>(r.company||'未設定')===co).length;wrap.appendChild(mk(`${co} (${cnt}件)`,()=>{filtered=allData.filter(r=>(r.company||'未設定')===co);currentCompany=co;renderAll();}));});
  document.getElementById('filterCard').classList.remove('hidden');
}

function calcRates(cat){
  const qids=Q_MAP[cat.id]||[]; let tot=0,neg=0;
  filtered.forEach(row=>{const ans=parseAnswers(row);qids.forEach(qid=>{const v=ans[qid];if(v==='そう思う'||v==='思う'||v==='どちらとも言えない'||v==='思わない'){tot++;if(v==='思わない')neg++;}});});
  const negRate=tot>0?parseFloat((neg/tot*100).toFixed(1)):0;
  return{posRate:parseFloat((100-negRate).toFixed(1)),negRate};
}

function calcOverall(){
  let tot=0,neg=0;
  filtered.forEach(row=>{const ans=parseAnswers(row);Object.entries(ans).forEach(([k,v])=>{if(ENPS_KEYS.has(k))return;if(v==='そう思う'||v==='思う'||v==='どちらとも言えない'||v==='思わない'){tot++;if(v==='思わない')neg++;}});});
  if(tot>0)return parseFloat((100-neg/tot*100).toFixed(1));
  /* フォールバック: negativeRate は小数（0〜1）で格納されているため×100 */
  const rates=filtered.map(r=>parseFloat(r.negativeRate)||0).filter(n=>!isNaN(n));
  if(rates.length)return parseFloat((100-rates.reduce((a,b)=>a+b,0)/rates.length*100).toFixed(1));
  return 0;
}

function calcENPS(){
  let promo=0,neut=0,detr=0;
  filtered.forEach(row=>{const ans=parseAnswers(row);let v=null;for(const k of ENPS_KEYS){if(ans[k]!==undefined){v=ans[k];break;}}if(v==='promo'||v==='思う')promo++;else if(v==='neut')neut++;else if(v==='detr'||v==='思わない')detr++;});
  const total=promo+neut+detr;
  if(!total)return{promoP:0,neutP:0,detrP:0,score:0};
  const promoP=parseFloat((promo/total*100).toFixed(1)),neutP=parseFloat((neut/total*100).toFixed(1)),detrP=parseFloat((detr/total*100).toFixed(1));
  return{promoP,neutP,detrP,score:Math.round(promoP-detrP)};
}

function judge(n){if(n<35)return{label:'◎ 良好',cls:'b-good'};if(n<55)return{label:'△ 注意',cls:'b-warn'};return{label:'✕ 要改善',cls:'b-bad'};}

  document.getElementById('enpsDetr').textContent=enps.detrP;

function renderTraining(cats){
  const sorted=[...cats].sort((a,b)=>b.negRate-a.negRate).filter(c=>c.negRate>=35);

}

<div class="page"><div class="cover"><h1>📋 このレポートの見方・指標解説</h1><p>作成日：${today}　　対象：${currentCompany}</p></div><div class="sec">📌 このレポートについて</div><p style="font-size:12.5px;line-height:1.8;color:#374151;margin-bottom:10px">本レポートは、組織診断アンケートの回答を集計・分析した結果です。各設問に対して従業員が「<strong>そう思う</strong>」「<strong>どちらとも言えない</strong>」「<strong>思わない</strong>」の3段階で回答しており、その分布からポジティブ率・ネガティブ率を算出しています。</p><div class="sec">📊 ポジティブ率・ネガティブ率の見方</div><table style="margin-bottom:10px"><thead><tr><th>判定</th><th>ネガティブ率</th><th>意味</th></tr></thead><tbody><tr><td>◎ 良好</td><td>35%未満</td><td>概ね良好な状態。継続的な維持・強化を推奨</td></tr><tr><td>△ 注意</td><td>35〜54%</td><td>一部に不満が蓄積。早期の対策検討が必要</td></tr><tr><td>✕ 要改善</td><td>55%以上</td><td>組織的な課題あり。優先的な施策実施を推奨</td></tr></tbody></table><div class="sec">💚 eNPS（従業員推薦度）とは</div><p style="font-size:12px;line-height:1.7;color:#374151;margin-bottom:8px">「この会社を友人や家族に職場として勧めたいか？（0〜10点）」という質問への回答から算出する指標です。</p><table style="margin-bottom:8px"><thead><tr><th>スコア</th><th>区分</th><th>説明</th></tr></thead><tbody><tr><td style="text-align:center">9〜10点</td><td><strong style="color:#16a34a">推薦者（Promoters）</strong></td><td>積極的に会社を推薦する社員</td></tr><tr><td style="text-align:center">7〜8点</td><td><strong style="color:#ca8a04">中立者（Passives）</strong></td><td>スコア計算に含めない</td></tr><tr><td style="text-align:center">0〜6点</td><td><strong style="color:#dc2626">批判者（Detractors）</strong></td><td>会社を推薦しない・否定的な社員</td></tr></tbody></table><p style="font-size:12px;color:#374151;font-weight:600;margin-bottom:8px">計算式：eNPS ＝ 推薦者の割合(%) − 批判者の割合(%)　　範囲：−100〜＋100</p><table style="margin-bottom:10px"><thead><tr><th>eNPSスコア</th><th>評価（日本企業基準）</th></tr></thead><tbody><tr><td>＋30以上</td><td>非常に優秀</td></tr><tr><td>＋10〜＋30</td><td>良好</td></tr><tr><td>0〜＋10</td><td>平均的（中小企業はここが多い）</td></tr><tr><td>0未満</td><td>要注意（日本の中小企業平均は−20〜0程度）</td></tr></tbody></table><div class="sec">🗂️ カテゴリ一覧</div><table><thead><tr><th>カテゴリ</th><th>主な評価項目</th></tr></thead><tbody><tr><td>①理念・ビジョン・方針</td><td>企業理念の浸透、経営方針の共有・共感</td></tr><tr><td>②職場環境・人間関係</td><td>職場の雰囲気、上司・同僚との関係性、ハラスメント対策</td></tr><tr><td>③仕事・業務内容</td><td>仕事のやりがい、スキル活用、成長実感</td></tr><tr><td>④労働条件・働き方</td><td>労働時間、WLB、過度な負担がないか</td></tr><tr><td>⑤管理職・マネジメント</td><td>上司の指導力、目標管理、フィードバック</td></tr><tr><td>⑥評価・育成・キャリア</td><td>評価の公平性、昇進ルール、キャリアビジョン</td></tr><tr><td>⑦処遇・報酬・福利厚生</td><td>給与水準、福利厚生、WLB制度</td></tr><tr><td>⑧組織コミュニケーション</td><td>情報共有、チームワーク、教育・研修</td></tr></tbody></table><div class="footer">組織診断システム ｜ ${currentCompany} ｜ ${today} ｜ 1/4</div></div>
<div class="page"><div class="cover"><h1>📊 組織診断レポート</h1><p>作成日：${today}　　対象：${currentCompany}　　回答数：${n}件</p></div><div class="sec">📈 全体サマリー</div><div class="kpi-row"><div class="kbox"><div class="kl">回答数</div><div class="kv">${n}</div><div class="ku">件</div></div><div class="kbox"><div class="kl">全体ポジティブ率</div><div class="kv">${pos}</div><div class="ku">%</div></div><div class="kbox"><div class="kl">eNPSスコア</div><div class="kv">${enps.score>=0?'+'+enps.score:enps.score}</div><div class="ku">pt</div></div></div><div class="sec">💚 eNPS（従業員推薦度）</div><div class="enps-row"><div class="eb"><div class="el">推薦者（9〜10）</div><div class="ev" style="color:#16a34a">${enps.promoP}%</div></div><div class="eb"><div class="el">中立者（7〜8）</div><div class="ev" style="color:#ca8a04">${enps.neutP}%</div></div><div class="eb"><div class="el">批判者（0〜6）</div><div class="ev" style="color:#dc2626">${enps.detrP}%</div></div><div class="eb"><div class="el">eNPSスコア</div><div class="ev" style="color:#1a365d">${enps.score>=0?'+'+enps.score:enps.score}</div></div></div><div class="sec" style="margin-top:10px">📊 カテゴリ別スコア</div><table><thead><tr><th>カテゴリ</th><th style="text-align:center;width:105px">ポジティブ率</th><th style="text-align:center;width:105px">ネガティブ率</th><th style="text-align:center;width:88px">判定</th></tr></thead><tbody>${cats.map(c=>`<tr><td>${c.name}</td><td style="text-align:center;color:#16a34a;font-weight:700">${c.posRate}%</td><td style="text-align:center;color:#dc2626;font-weight:700">${c.negRate}%</td><td style="text-align:center">${bHtml(c.negRate)}</td></tr>`).join('')}</tbody></table><div class="footer">組織診断システム ｜ ${currentCompany} ｜ ${today} ｜ 2/4</div></div>
<div class="page"><div class="sec">📊 カテゴリ別スコア</div><div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:8px"><div style="flex:1;min-width:0"><div style="font-size:11px;color:#718096;margin-bottom:4px;font-weight:600">■ 棒グラフ（ポジティブ率／ネガティブ率）</div><img src="${barImg}" style="width:100%;max-height:175px;object-fit:contain" alt="棒グラフ"></div><div style="flex:0 0 188px"><div style="font-size:11px;color:#718096;margin-bottom:4px;font-weight:600">■ レーダーチャート</div><img src="${radarImg}" style="width:100%;max-height:175px;object-fit:contain" alt="レーダーチャート"></div></div><div class="sec" style="margin-top:8px">📚 研修ニーズ分析</div>${training.length===0?'<p style="color:#16a34a;padding:12px">✅ 全カテゴリで研修の優先ニーズは検出されませんでした</p>':training.map((c,i)=>{const info=TRAINING_MAP[c.id]||{title:c.name,desc:''};return`<div class="need"><div class="nr">${i+1}</div><div><div class="nt">${info.title}&nbsp;${bHtml(c.negRate)}&nbsp;<span style="font-size:11px;color:#718096">${c.name} ネガ率 ${c.negRate}%</span></div><div class="nd">${info.desc}</div></div></div>`;}).join('')}<div class="footer">組織診断システム ｜ ${currentCompany} ｜ ${today} ｜ 3/4</div></div>
<div class="page"><div class="sec">💼 人事施策提言</div>${policy.length===0?'<p style="color:#16a34a;padding:12px">✅ 現時点で優先的な人事施策提言はありません</p>':policy.map((c,i)=>{const info=POLICY_MAP[c.id]||{title:c.name,desc:'',actions:[],success:'',effect:''};const acts=(info.actions||[]).map((a,j)=>`${j+1}. ${a}`).join('　');return`<div class="need"><div class="nr">${i+1}</div><div style="flex:1"><div class="nt">${info.title}&nbsp;${bHtml(c.negRate)}&nbsp;<span style="font-size:11px;color:#718096">${c.name} ネガ率 ${c.negRate}%</span></div><div class="nd">${info.desc}</div><div class="pa">📋 <strong>具体的アクション：</strong>${acts}</div>${info.success?`<div class="ps">🏭 ${info.success}</div>`:''}<div class="pe">📈 ${info.effect}</div></div></div>`;}).join('')}<div class="footer">組織診断システム ｜ ${currentCompany} ｜ ${today} ｜ 4/4</div></div>
<script>window.onload=function(){setTimeout(function(){window.print();},600)};<\/script></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank');
  if(win)win.onunload=()=>URL.revokeObjectURL(url);
  else{alert('ポップアップがブロックされています。このサイトのポップアップを許可してください。');URL.revokeObjectURL(url);}
}

function exportExcel(){
  if(!filtered.length){alert('データがありません');return;}
  const n=filtered.length,pos=calcOverall(),enps=calcENPS(),cats=CATEGORIES.map(c=>({...c,...calcRates(c)}));
  const sorted=[...cats].sort((a,b)=>b.negRate-a.negRate);
  const training=sorted.filter(c=>c.negRate>=35),policy=sorted.filter(c=>c.negRate>=35).slice(0,5);
  const today=new Date().toLocaleDateString('ja-JP');
  const wb=XLSX.utils.book_new();
  const wsExplain=XLSX.utils.aoa_to_sheet([['📋 このレポートの見方・指標解説'],['作成日',today,'対象',currentCompany],[],['【このレポートについて】'],['本レポートは組織診断アンケートの回答を集計・分析した結果です。各設問に対して従業員が「そう思う」「どちらとも言えない」「思わない」の3段階で回答しており、その分布からポジティブ率・ネガティブ率を算出しています。'],[],['【ポジティブ率・ネガティブ率の見方】'],['判定','ネガティブ率','意味'],['◎ 良好','35%未満','概ね良好な状態。継続的な維持・強化を推奨'],['△ 注意','35〜54%','一部に不満が蓄積。早期の対策検討が必要'],['✕ 要改善','55%以上','組織的な課題あり。優先的な施策実施を推奨'],[],['【eNPS（従業員推薦度）とは】'],['"この会社を友人や家族に職場として勧めたいか？（0〜10点）"への回答から算出する指標です。'],['スコア','区分','説明'],['9〜10点','推薦者（Promoters）','積極的に会社を推薦する社員'],['7〜8点','中立者（Passives）','スコア計算に含めない'],['0〜6点','批判者（Detractors）','会社を推薦しない・否定的な社員'],[],['計算式：eNPS ＝ 推薦者の割合(%) − 批判者の割合(%)　　範囲：−100〜＋100'],[],['eNPSスコア','評価（日本企業基準）'],['＋30以上','非常に優秀'],['＋10〜＋30','良好'],['0〜＋10','平均的（中小企業はここが多い）'],['0未満','要注意（日本の中小企業平均は−20〜0程度）'],[],['【カテゴリ一覧】'],['カテゴリ','主な評価項目'],['①理念・ビジョン・方針','企業理念の浸透、経営方針の共有・共感'],['②職場環境・人間関係','職場の雰囲気、上司・同僚との関係性、ハラスメント対策'],['③仕事・業務内容','仕事のやりがい、スキル活用、成長実感'],['④労働条件・働き方','労働時間、WLB、過度な負担がないか'],['⑤管理職・マネジメント','上司の指導力、目標管理、フィードバック'],['⑥評価・育成・キャリア','評価の公平性、昇進ルール、キャリアビジョン'],['⑦処遇・報酬・福利厚生','給与水準、福利厚生、WLB制度'],['⑧組織コミュニケーション','情報共有、チームワーク、教育・研修']]);
  wsExplain['!cols']=[{wch:30},{wch:30},{wch:52}];XLSX.utils.book_append_sheet(wb,wsExplain,'📋見方・指標解説');
  const ws1=XLSX.utils.aoa_to_sheet([['組織診断レポート'],['作成日',today,'対象',currentCompany],[],['【全体サマリー】'],['回答数',n],['全体ポジティブ率',pos+'%'],['eNPSスコア',(enps.score>=0?'+':'')+enps.score+'pt'],[],['【eNPS詳細】'],['推薦者（9〜10）',enps.promoP+'%'],['中立者（7〜8）',enps.neutP+'%'],['批判者（0〜6）',enps.detrP+'%'],['eNPSスコア',(enps.score>=0?'+':'')+enps.score]]);
  ws1['!cols']=[{wch:20},{wch:16},{wch:16},{wch:20}];XLSX.utils.book_append_sheet(wb,ws1,'①サマリー');
  const ws2=XLSX.utils.aoa_to_sheet([['カテゴリ','ポジティブ率','ネガティブ率','判定'],...cats.map(c=>[c.name,c.posRate+'%',c.negRate+'%',judge(c.negRate).label])]);
  ws2['!cols']=[{wch:28},{wch:14},{wch:14},{wch:12}];XLSX.utils.book_append_sheet(wb,ws2,'②カテゴリ別スコア');
  const ws3=XLSX.utils.aoa_to_sheet([['優先度','カテゴリ','ネガティブ率','判定','推奨研修','詳細'],...(training.length?training.map((c,i)=>{const info=TRAINING_MAP[c.id]||{title:'',desc:''};return[i+1,c.name,c.negRate+'%',judge(c.negRate).label,info.title,info.desc];}):[['',' 研修ニーズなし','','','','']])]);
  ws3['!cols']=[{wch:8},{wch:28},{wch:14},{wch:12},{wch:32},{wch:52}];XLSX.utils.book_append_sheet(wb,ws3,'③研修ニーズ');
  const ws4=XLSX.utils.aoa_to_sheet([['優先度','カテゴリ','ネガティブ率','判定','提言タイトル','詳細'],...(policy.length?policy.map((c,i)=>{const info=POLICY_MAP[c.id]||{title:'',desc:''};return[i+1,c.name,c.negRate+'%',judge(c.negRate).label,info.title,info.desc];}):[['',' 提言なし','','','','']])]);
  ws4['!cols']=[{wch:8},{wch:28},{wch:14},{wch:12},{wch:32},{wch:52}];XLSX.utils.book_append_sheet(wb,ws4,'④人事施策提言');
  const ws5rows=[['タイムスタンプ','回答者ID','会社名','回答者名','部署','役職','ネガティブ率','eNPS']];
  filtered.forEach(row=>{const ans=parseAnswers(row);let ev='';for(const k of ENPS_KEYS){if(ans[k]!==undefined){ev=ans[k];break;}}ws5rows.push([row.timestamp||'',row.respondentId||'',row.company||'',row.respondentName||'',row.department||'',row.position||'',(row.negativeRate||0)+'%',ev]);});
  const ws5=XLSX.utils.aoa_to_sheet(ws5rows);ws5['!cols']=[{wch:18},{wch:14},{wch:20},{wch:20},{wch:16},{wch:16},{wch:14},{wch:10}];XLSX.utils.book_append_sheet(wb,ws5,'⑤個別回答データ');
  XLSX.writeFile(wb,`組織診断レポート_${currentCompany}_${today.replace(/\//g,'')}.xlsx`);
}
</script>
</body>
